<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechTuner BD</title>
  <link rel="stylesheet" href="style.css"> <!-- CSS ফাইল লিঙ্ক করা হলো -->
</head>
<body>
  <div class="main-content">
    <h1>TechTuner BD</h1>
    <p>বাংলায় হার্ডওয়্যার ও সফটওয়্যার টিউনিংয়ের নতুন ঠিকানা</p>
    <div class="author">By Salman Khan Bahadur</div>
  </div>

  <div class="sidebar">
    <button class="accordion">Computer Part</button>
    <div class="panel">
      <p>🔹 Prossesor: কোর, থ্রেড, ক্লক স্পিড</p>
      <p>🔹 Motherbord: চিপসেট, স্লট, ফর্ম ফ্যাক্টর</p>
      <p>🔹 RAM: DDR টাইপ, স্পিড, ক্যাপাসিটি</p>
    </div>
  </div>

  <script>
    const acc = document.querySelector(".accordion");
    const panel = document.querySelector(".panel");

    acc.addEventListener("click", function () {
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    });
  </script>
</body>
</html>
